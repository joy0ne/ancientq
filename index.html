<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060710" />
  <meta name="description" content="AncientQ — Ancient Principles, Quantum Frontiers. Educational simulations bridging historical science with quantum physics." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="color-scheme" content="dark" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; worker-src 'self' blob:;" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="no-referrer" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=()" />
  <title>AncientQ</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; min-height: 100vh;
      background: #060710; color: #D8D0C4;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { overflow-y: auto; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    nav::-webkit-scrollbar { display: none; }
    nav { -ms-overflow-style: none; scrollbar-width: none; }
    button:focus-visible, input:focus-visible, [role="tab"]:focus-visible {
      outline: 2px solid #00E5FF;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <div style="padding:40px;text-align:center;color:#D8D0C4;font-family:Georgia,serif;">
      AncientQ requires JavaScript. All computation runs locally — no data is sent anywhere.
    </div>
  </noscript>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
