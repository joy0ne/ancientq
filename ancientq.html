        `Prestressed concrete introduces compressive stress to counteract anticipated tensile stresses from service loads. Concrete's tensile strength is ~10% of compressive (ft ≈ 0.1 f′c); cracking under bending limits effective use. Eugène Freyssinet (1928) patented modern prestressing using high-strength steel tendons; Magnel developed wedge anchorage. Two methods:`,
        `(1) Pre-tensioning: tendons stressed in casting bed, concrete cast around them, after curing tendons released and force transfers via bond (transfer length ~50-100·ø). Used for precast: hollow-core slabs, double-tees, AASHTO girders. Strands: 7-wire 12.7 or 15.2 mm ø, fpu = 1860 MPa, jacked to 0.75 fpu = 1395 MPa. (2) Post-tensioning: tendons threaded through ducts (bonded — grouted; or unbonded — greased + sheathed), stressed against hardened concrete using hydraulic jacks (Freyssinet K-range, VSL multi-strand anchorages — wedges grip strands in conical anchor). Used for cast-in-place: bridges (segmental cantilever construction — Brotonne, Sundsvall, Rio-Niterói 8.3 km), nuclear containment domes, floor slabs in tall buildings. Tendon types: monostrands (15.2 mm) up to 200 kN, multistrand (12-31 strands per duct) up to 6 MN.`,

        `Musical acoustics applies wave physics to sound production and perception. Every musical note is a fundamental frequency f₁ plus harmonics f_n = n·f₁ — the mix of harmonic amplitudes creates timbre, distinguishing a violin from a trumpet playing the same note. Standing waves in strings: fₙ = n·v/(2L) where v = √(T/μ), T is tension and μ is linear density. In pipes: open pipe fₙ = n·v/(2L), closed pipe fₙ = n·v/(4L) (odd harmonics only, giving the clarinet its hollow tone). Resonance amplifies specific frequencies — a guitar body resonates to enhance string vibrations.`,
        `Consonance and dissonance have physical roots: Pythagoras discovered that pleasing intervals correspond to simple frequency ratios — octave (2:1), perfect fifth (3:2), fourth (4:3). The equal temperament system divides the octave into 12 equal semitones with ratio 2^(1/12) ≈ 1.05946, a compromise enabling key changes at the cost of slightly impure intervals. Beats occur when two close frequencies interfere: f_beat = |f₁ − f₂| — piano tuners use this. The Helmholtz resonator selectively amplifies specific frequencies: f = (v/2π)√(A/(V·L)), used in acoustic treatment and musical instruments (acoustic guitar body). Fletcher-Munson curves show human hearing sensitivity varies with frequency — we hear 1-5 kHz best at low volumes. Applications include concert hall design (reverberation time T₆₀ = 0.161·V/A, Sabine equation), digital audio (sampling at ≥ 2f_max per Nyquist theorem), and electronic synthesis (additive, subtractive, FM synthesis).`,

        `James Clerk Maxwell (1865) unified electricity and magnetism in four equations and predicted electromagnetic waves traveling at c = 1/√(μ₀ε₀) = 2.998×10⁸ m/s — matching the measured speed of light, revealing that light IS an electromagnetic wave. Heinrich Hertz (1887) experimentally confirmed this by generating and detecting radio waves. The EM spectrum spans >20 orders of magnitude in wavelength: radio (>1mm, AM/FM/WiFi/5G), microwave (1mm-1m, radar/ovens/CMB), infrared (700nm-1mm, heat/thermal imaging), visible (400-700nm), ultraviolet (10-400nm, sunburn/sterilization), X-ray (0.01-10nm, medical imaging/crystallography), gamma (<0.01nm, nuclear/cosmic).`,
        `EM waves are transverse: E and B oscillate perpendicular to each other and to propagation direction, with E/B = c always. Energy: intensity I = ½ε₀cE₀² = Poynting vector magnitude S = E×B/μ₀. Sunlight intensity at Earth: ~1361 W/m². Radiation pressure P = I/c (absorbed) or 2I/c (reflected) — solar sails use this for propulsion (~9 μN/m² at 1 AU). Photon energy E = hf = hc/λ: radio photons ~10⁻²⁵ J, visible ~10⁻¹⁹ J, gamma ~10⁻¹¹ J. Polarization: linear (E oscillates in one plane), circular (E rotates), elliptical. Malus' law I = I₀cos²θ governs polarizer transmission. Antenna theory: a half-wave dipole (L = λ/2) radiates most efficiently; gain measured in dBi. Modern applications: fiber optics (total internal reflection at 1.3/1.55 μm), radar (range R ∝ P^(1/4)), MRI (radio pulse excites nuclear magnetic moments), and gravitational wave detectors (laser interferometry measuring ΔL ~10⁻¹⁸ m).`,

      title: `Simple Harmonic Motion`,
      sub: `Pendulum, springs, resonance`,
      paragraphs: [
        `Simple harmonic motion (SHM) occurs when a restoring force is proportional to displacement: F = −kx (Hooke's law). The resulting motion is sinusoidal: x(t) = A·cos(ωt + φ) where A is amplitude, ω = √(k/m) = 2πf is angular frequency, and φ is phase. The period T = 2π√(m/k) is independent of amplitude — the defining feature of SHM. For a simple pendulum (small angles): T = 2π√(L/g), with g = 9.81 m/s², a 1m pendulum swings with T = 2.006 s — Galileo noticed this circa 1602, and Huygens built the first pendulum clock in 1656.`,
        `Energy oscillates between kinetic and potential: E = ½kA² = ½kx² + ½mv² (constant, no energy loss in ideal SHM). At x=0: all KE, max velocity v_max = Aω. At x=±A: all PE, zero velocity. Damped SHM adds drag: x(t) = Ae^(−γt)cos(ω't) where γ = b/(2m) and ω' = √(ω₀²−γ²). Underdamped (γ<ω₀): oscillates with decaying amplitude. Critically damped (γ=ω₀): fastest return to equilibrium without oscillation — car shock absorbers. Overdamped (γ>ω₀): slow exponential return. Driven/forced SHM with driving frequency ω_d: amplitude peaks at resonance when ω_d = ω₀ — the Tacoma Narrows Bridge collapsed (1940) from wind-driven resonance. Quality factor Q = ω₀/(2γ): quartz crystals Q~10⁵ (sharp resonance for watches), acoustic guitar Q~10² (broader resonance for rich sound). SHM is ubiquitous: molecular vibrations (IR spectroscopy), LC circuits (V = V₀cos(t/√(LC))), and quantum harmonic oscillator (Eₙ = (n+½)ℏω).`,

        `Wireless power transfer moves electrical energy between systems without conductive contact. Three regimes: (1) Near-field non-resonant inductive (Qi standard) at <10 cm distances; (2) Near-field resonant magnetic coupling (NF-MR) at 1-30 cm with higher efficiency; (3) Far-field via radiative beams (microwave, laser) at meters to km. Nikola Tesla's Wardenclyffe (1901-1917) attempted Earth-resonance wireless transmission — unfinished, but the modern field traces lineage and inspiration.`,
        `Qi standard (Wireless Power Consortium 2008): dominant phone-charging standard. Operates 87-205 kHz (Qi v2 BPP); 5-15 W typical; coil-to-coil distance <8 mm; efficiency 70-85%. Qi v2.0 (2023) integrates Apple MagSafe magnetics, raises to 15 W universal. Adopted by 9000+ products. AirFuel Resonant (defunct 2019, A4WP/PMA merger) tried 6.78 MHz longer-range — failed commercially against Qi but technology lives in industrial WPT.`,
        `Resonant magnetic coupling (Soljacic, MIT 2007 "WiTricity"): two LC resonators tuned to same frequency exchange energy via coupled magnetic fields. Efficiency η = (k·Q)²/(1+(k·Q)²) where k = mutual coupling, Q = quality factor — large Q (200-1000) makes 1-50 cm transfer practical. WiTricity Halo for EV charging at 11 kW, 90%+ efficiency, 10-25 cm air gap. SAE J2954 (2020, J2954/2 2022) standardizes EV wireless charging at 3.7/7.7/11/22 kW, 85 kHz. Deployed: BMW 530e (2018), Hyundai Genesis GV60 (2023), public bus charging in Mannheim, Milan, Madrid (200 kW dynamic). Korea Electric Vehicle Technology (KAIST OLEV) dynamic charging via in-road coils, deployed in Gumi 2013-2019.`,
        `Industrial WPT: rotating machinery (slip-ring replacement, 100-1000 W); medical implants — cochlear implants, LVADs (Abbott HeartMate 3 percutaneous lead but wireless under development), retinal implants; AGV/robotics charging (Daifuku, MURATA). Industrial inductive heating overlaps WPT physics — 1-30 kHz, 100s kW efficient power coupling.`,

        `Wardenclyffe Tower (1901-1905) was Tesla's most ambitious project — intended as the first station of a global wireless communication and power transmission system. Located in Shoreham, Long Island, NY, designed by architect Stanford White. The tower stood 57 meters (187 feet) tall with a distinctive 20-meter (68-foot) copper-clad dome, supported by a wooden frame structure. Below ground: a network of iron pipes and tunnels extending 36 meters deep, designed to "grip the Earth" and establish electrical connection with the ground.`,
        `Funding and downfall: J.P. Morgan invested $150,000 (equivalent to ~$5M today) for what he understood as a wireless TELEGRAPHY station (competing with Marconi). When Tesla revealed his true vision — wireless POWER transmission to the world — Morgan reportedly replied: "If anyone can draw on the power, where do we put the meter?" Morgan refused additional funding. Meanwhile, Marconi transmitted the letter "S" across the Atlantic (1901) using much simpler technology → investors lost interest in Tesla's grandiose approach. Tesla desperately sought other investors (Astor, Ryan, others) — all declined. 1905: operations ceased. 1915: Tesla transferred the Wardenclyffe deed to pay $20,000 hotel debt at the Waldorf-Astoria. 1917: tower dynamited for scrap metal. Rescue (2013): crowdfunding campaign led by The Oatmeal's Matthew Inman raised $1.37 million from 33,000+ donors to purchase the Wardenclyffe site → preserved as future Tesla Science Center and museum. Was it feasible? The communication aspect was technically sound (ELF radio works via Earth-ionosphere cavity). The power transmission aspect remains debated — physically possible but commercially impractical due to enormous efficiency losses over distance.`,

        `Technology: three identical X-ray telescopes with grazing-incidence optics (Wolter Type 1 mirrors) + gas pixel detectors (GPDs) at focal plane — GPDs detect photoelectrons via Penning effect in dimethyl ether gas, tracks electron emission direction reveals incoming X-ray polarization angle. Energy range 2-8 keV; angular resolution ~30 arcsec; effective area ~600 cm². Spacecraft + telescope are joint Ball Aerospace + ASI INAF; instrument GPDs developed Italian INAF labs (Costa et al). Total mission cost ~$200M (Explorer class).`,
        `Key discoveries 2022-2024: 1. Crab Nebula + Pulsar (first published result 2022) — measured polarization Crab pulsar wind nebula; revealed magnetic field structure consistent with prior models but with refined orientation; pulsar itself shows phase-dependent polarization. 2. Black hole accretion (Cygnus X-1, Cygnus X-3, GX 339-4, Swift J1727) — measured polarization from accretion disks around stellar-mass black holes; surprising result Cyg X-1 (2022 Nature) high polarization (~4%) consistent with horizontally-extended accretion flow geometry — informs disk-corona physics. 3. Accreting neutron stars (Her X-1, Cen X-3, others) — first polarimetric studies; magnetic field geometry constraints. 4. Magnetar 4U 0142+61 — strong polarization measured; magnetic field structure revealed. 5. AGN + supermassive black holes — quasar jets (Mrk 421, Mrk 501 blazars), Seyfert galaxies (NGC 4151) — first X-ray polarization measurements probing jet acceleration + emission mechanisms; constraints synchrotron vs inverse Compton vs hadronic models. 6. Supernova remnants (Cas A, Tycho's SNR, SN 1006) — magnetic field structure in shock acceleration regions; cosmic ray acceleration insights.`,

        `Millennium Prize Problem ($1M): prove whether smooth solutions always exist for 3D Navier-Stokes given smooth initial conditions, or demonstrate finite-time blowup (singularity formation). Despite 180+ years since formulation, this remains UNSOLVED — we don't even know if the equations we use to design aircraft are mathematically well-posed! Reynolds number Re = ρvL/μ: ratio of inertial to viscous forces. Re < ~2300 (pipe): laminar (smooth, predictable). Re > ~4000: turbulent (chaotic, unpredictable at small scales — Richardson cascade: large eddies → smaller eddies → ... → dissipation at Kolmogorov scale η = (ν³/ε)^{1/4} ~0.1 mm in atmosphere). Turbulence is the last great unsolved problem in classical physics — Heisenberg reportedly said "When I meet God, I am going to ask him two questions: Why relativity? And why turbulence? I really believe he will have an answer for the first." Computational Fluid Dynamics (CFD): discretize NS on mesh → solve numerically. DNS (Direct Numerical Simulation): resolve ALL scales → Re³ grid points needed → only feasible for Re ~10⁴. RANS (Reynolds-Averaged): model turbulence (k-ε, k-ω) → industrial standard. LES (Large Eddy Simulation): resolve large eddies, model small → intermediate cost/accuracy.`,

        `DNA data storage encodes digital information (0s and 1s) as sequences of nucleotides (A, T, C, G — 2 bits per base). Theoretical density: ~455 exabytes per gram — all of the world's data (~120 ZB in 2023) could fit in a few hundred kilograms of DNA. Stability: DNA survives millennia under proper conditions (woolly mammoth genome read after >1 million years in permafrost; seeds in the Svalbard Vault). George Church (Harvard, 2012) encoded a 53,400-word book in DNA; Microsoft/UW (2016) stored 200 MB using 13 million oligonucleotides.`,

        `QEC fundamentals: Peter Shor 1995 first QEC code; Calderbank-Shor-Steane (CSS) codes; surface code (Kitaev, Bravyi, Fowler) leading for solid-state — 2D lattice of qubits with ancillas measuring stabilizers; error syndrome continuously measured; classical decoder identifies + corrects. Threshold theorem (Aharonov-Ben-Or, Knill-Laflamme-Zurek): if physical error rate below threshold (~1% for surface code), arbitrarily large reliable computation possible via scaling QEC.`,
        `Surface code + distance: Distance-d code uses ~d² physical qubits + corrects up to (d-1)/2 errors; logical error rate decreases exponentially with d when below threshold; fault tolerance requires distance ~17-30+ (1000s physical qubits per logical qubit).`,
        `Willow milestone December 2024:Hartmut Neven (Google Quantum AI) + team announced Willow:• 105 superconducting qubits (vs Sycamore's 53);• improved coherence times ~100 μs (~2× Sycamore generation);• Below threshold demonstration — increasing surface code distance from 3 → 5 → 7 → exponentially reducing logical error rates (~2× error suppression per code distance step) — qualitative signature of below-threshold; previously unclear superconducting platforms could achieve;• Performance benchmark: random circuit sampling reportedly ~5 minutes vs estimated 10 septillion years (~10²⁵) classical Frontier — extending quantum advantage;• Logical qubit at distance 7 outperforming single physical qubit lifetime — net positive logical information.Reactions: widespread excitement; Scott Aaronson + others called most significant quantum computing demonstration yet; cautioned still long way to fault-tolerant utility-scale; benchmark of limited practical use itself.`,
        `Other QEC progress:IBM Heron + Quantum System Two 2024+ — IBM roadmap targets 200 logical qubit Starling system by 2029; mixed approach better physical qubits (Heron 156 qubits 2024) + error mitigation + future QEC.Quantinuum H2 — ion trap; 56 high-quality qubits, very low error rates; 2024 demonstrated logical qubit operations with QEC; different tradeoff (fewer + higher-quality qubits).QuEra (Boston) — neutral atom; 256+ atoms with QEC 2023-2024.PsiQuantum — photonic; targeting million-qubit fault-tolerant; Australian government partnership 2024.Atom Computing — 1180-atom system 2023.IonQ, Rigetti, Pasqal, IQM, Oxford Quantum Circuits additional.`,

      title: `History of Climate Science`,

      paragraphs: [
        `Climate science evolved over 200 years from theoretical physics to global policy driver. Joseph Fourier (1824): first proposed that the atmosphere traps heat ("greenhouse effect" concept). John Tyndall (1859): experimentally demonstrated that CO₂ and H₂O absorb infrared radiation while N₂ and O₂ do not → identified greenhouse gases. Svante Arrhenius (1896): calculated that doubling CO₂ would raise temperature ~5-6°C — remarkably close to modern estimates of 2.5-4.0°C (he used pen and paper for months of calculation!).`,
        `Charles David Keeling (1958): began continuous CO₂ measurements at Mauna Loa → the Keeling Curve — humanity's most important graph: CO₂ rose from 315 ppm (1958) → 425 ppm (2024), a 35% increase, with seasonal oscillations from Northern Hemisphere vegetation. Syukuro Manabe (Nobel 2021): developed first climate model (1967) predicting ~2°C warming per CO₂ doubling using radiative-convective equilibrium. James Hansen (1988): testified before US Congress that global warming was detectable — put climate change on the political agenda. IPCC (Intergovernmental Panel on Climate Change, 1990): established by UN/WMO → synthesis reports every ~7 years, involving thousands of scientists. IPCC AR6 (2021-2023): "It is unequivocal that human influence has warmed the atmosphere, ocean and land." Paris Agreement (2015): 196 nations agreed to limit warming to well below 2°C, preferably 1.5°C above pre-industrial — requires net-zero emissions by ~2050. Current warming: ~1.2°C above pre-industrial (2024); 2023 was the hottest year on record. Evidence: isotopic signature of fossil fuel CO₂ (¹³C depletion), simultaneous stratospheric cooling + surface warming (greenhouse signature), and 800 kyr ice core record showing current CO₂ unprecedented.`,

function setupCanvas(canvas) {
  if (!canvas) return null;
  const dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
  const rect = canvas.getBoundingClientRect();
  const cssW = Math.max(1, rect.width || canvas.offsetWidth);
  const cssH = Math.max(1, parseFloat(canvas.style.height) || canvas.offsetHeight);
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W: cssW, H: cssH, dpr };
}

// ── Visibility-aware animation using the latest-callback-ref pattern ──
// This prevents the RAF loop from restarting on every render while still
// giving the callback access to the latest state/props (no stale closures).
// Also respects prefers-reduced-motion and pauses when document is hidden.
function useAnimationFrame(callback) {
  const cbRef = useRef(callback);
  useEffect(() => { cbRef.current = callback; }, [callback]);

  useEffect(() => {
    let rafId = 0;
    let active = true;
    const reduced = typeof window !== "undefined" &&
      window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const tick = () => {
      if (!active) return;
      if (!document.hidden && typeof cbRef.current === "function") {
        try { cbRef.current(); } catch (e) { /* swallow per-frame errors */ }
      }
      rafId = requestAnimationFrame(tick);
    };
    // Reduced motion: still call once for a static frame, do not animate
    if (reduced) {
      if (typeof cbRef.current === "function") {
        try { cbRef.current(); } catch (e) {}
      }
      return () => {};
    }
    rafId = requestAnimationFrame(tick);
    return () => { active = false; cancelAnimationFrame(rafId); };
  }, []);
}

// ── ErrorBoundary: isolates module crashes so the whole app never goes blank ──
class ModuleErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch() {
    // Deliberately no logging — respects privacy policy (zero telemetry)
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          padding: 20, borderRadius: 12,
          background: "rgba(255,77,77,0.08)",
          border: "1px solid rgba(255,77,77,0.25)",
          color: "#FF8888", fontFamily: "system-ui,sans-serif",
          fontSize: 13, lineHeight: 1.6
        }}>
          <strong>This module hit an unexpected error.</strong>
          <div style={{ marginTop: 8, fontSize: 12, color: "#8A7F73" }}>
            Try switching to another tab and coming back, or reload the app.
          </div>
          <button
            onClick={() => this.setState({ error: null })}
            style={{
              marginTop: 12, padding: "8px 14px",
              background: "rgba(255,77,77,0.12)",
              border: "1px solid rgba(255,77,77,0.35)",
              borderRadius: 6, color: "#FF8888", cursor: "pointer",
              fontFamily: "inherit", fontSize: 12
            }}
          >↺ Try again</button>
        </div>
      );
    }
    return this.props.children;
  }
}

function ConcreteSimulation() {
  const canvasRef = useRef(null);
  const stateRef = useRef({
    particles: [], cracks: [], healing: [], healingPool: [],
    time: 0, phase: "intact", healed: 0, bgSpots: null
  });
  const [phase, setPhase] = useState("intact");
  const [healedPct, setHealedPct] = useState(0);

  // One-time setup of particles (stable across renders)
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const setup = setupCanvas(canvas);
    if (!setup) return;
    const { W, H } = setup;
    const s = stateRef.current;
    s.particles = [];
    // Lime clasts
    for (let i = 0; i < 30; i++) {
      s.particles.push({
        x: 60 + Math.random() * (W - 120),
        y: 60 + Math.random() * (H - 120),
        r: 6 + Math.random() * 10,
        opacity: 0.9, dissolved: 0, type: "clast",
      });
    }
    // Aggregates
    for (let i = 0; i < 15; i++) {
      s.particles.push({
        x: 40 + Math.random() * (W - 80),
        y: 40 + Math.random() * (H - 80),
        r: 10 + Math.random() * 18,
        opacity: 0.6, type: "agg",
        color: ["#7A6B5A","#6B5D4C","#8B7D6C"][i % 3]
      });
    }
    // Pre-compute static background spots (perf)
    s.bgSpots = [];
    for (let i = 0; i < 150; i++) {
      s.bgSpots.push({
        x: 20 + Math.random() * (W - 40),
        y: 20 + Math.random() * (H - 40),
        size: 1.5 + Math.random() * 3,
        alpha: 0.2 + Math.random() * 0.3,
      });
    }
    // Pre-allocate healing pool (avoid GC pressure)
    for (let i = 0; i < 200; i++) {
      s.healingPool.push({ x:0, y:0, vx:0, vy:0, life:0, active:false });
    }
  }, []);

  useAnimationFrame(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    if (W < 10 || H < 10) return;
    const s = stateRef.current;
    s.time += 0.016;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#5C5346";
    ctx.fillRect(20, 20, W - 40, H - 40);

    // Static bg spots
    if (s.bgSpots) {
      for (let i = 0; i < s.bgSpots.length; i++) {
        const b = s.bgSpots[i];
        ctx.fillStyle = `rgba(90,80,65,${b.alpha})`;
        ctx.fillRect(b.x, b.y, b.size, b.size);
      }
    }

    // Aggregates
    for (let i = 0; i < s.particles.length; i++) {
      const p = s.particles[i];
      if (p.type !== "agg") continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Lime clasts
    const pulse = Math.sin(s.time * 2) * 0.15;
    for (let i = 0; i < s.particles.length; i++) {
      const p = s.particles[i];
      if (p.type !== "clast") continue;
      const rr = p.r * (1 - p.dissolved);
      if (rr <= 0) continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr);
      grad.addColorStop(0, `rgba(245,240,224,${(p.opacity - p.dissolved) * 0.9 + pulse})`);
      grad.addColorStop(1, `rgba(210,195,160,${(p.opacity - p.dissolved) * 0.5})`);
      ctx.fillStyle = grad;
      ctx.fill();
      if (p.dissolved > 0 && p.dissolved < 0.95) {
        ctx.strokeStyle = `rgba(0,229,255,${0.3 + pulse})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // Cracks
    for (let c = 0; c < s.cracks.length; c++) {
      const crack = s.cracks[c];
      ctx.beginPath();
      ctx.moveTo(crack[0].x, crack[0].y);
      for (let j = 1; j < crack.length; j++) ctx.lineTo(crack[j].x, crack[j].y);
      ctx.strokeStyle = s.phase === "healed" ? "rgba(0,229,255,0.2)" : "rgba(30,20,10,0.9)";
      ctx.lineWidth = s.phase === "healed" ? 1 : 3;
      ctx.stroke();
      if (s.phase === "water" || s.phase === "healing") {
        ctx.strokeStyle = `rgba(80,140,220,${0.3 + Math.sin(s.time * 3) * 0.2})`;
        ctx.lineWidth = 5;
        ctx.stroke();
      }
    }

    // Healing particles (from pool)
    for (let i = 0; i < s.healingPool.length; i++) {
      const h = s.healingPool[i];
      if (!h.active) continue;
      h.life -= 0.005;
      h.x += h.vx; h.y += h.vy;
      h.vx *= 0.98; h.vy *= 0.98;
      if (h.life <= 0) { h.active = false; continue; }
      ctx.beginPath();
      ctx.arc(h.x, h.y, 3 + h.life * 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,229,255,${h.life * 0.8})`;
      ctx.fill();
    }

    // Healing logic
    if (s.phase === "healing") {
      for (let c = 0; c < s.cracks.length; c++) {
        const crack = s.cracks[c];
        for (let j = 0; j < crack.length; j += 2) { // skip points for perf
          const pt = crack[j];
          for (let i = 0; i < s.particles.length; i++) {
            const p = s.particles[i];
            if (p.type !== "clast" || p.dissolved >= 0.95) continue;
            const dx = p.x - pt.x, dy = p.y - pt.y;
            if (dx * dx + dy * dy < 3600) { // 60² (no sqrt)
              p.dissolved += 0.002;
              if (Math.random() < 0.1) {
                // Reuse pool slot
                for (let k = 0; k < s.healingPool.length; k++) {
                  const h = s.healingPool[k];
                  if (!h.active) {
                    h.x = p.x; h.y = p.y;
                    h.vx = (pt.x - p.x) * 0.02;
                    h.vy = (pt.y - p.y) * 0.02;
                    h.life = 1; h.active = true;
                    break;
                  }
                }
              }
            }
          }
        }
      }
      // Count dissolved
      let totalDiss = 0, count = 0;
      for (let i = 0; i < s.particles.length; i++) {
        const p = s.particles[i];
        if (p.type === "clast" && p.dissolved > 0) {
          totalDiss += p.dissolved; count++;
        }
      }
      const avg = count ? totalDiss / count : 0;
      const pct = Math.min(100, Math.round(avg * 110));
      if (pct !== s.healed) {
        s.healed = pct;
        setHealedPct(pct);
      }
      if (avg > 0.9 && s.phase !== "healed") {
        s.phase = "healed";
        setPhase("healed");
      }
    }

    // Status label
    ctx.font = `16px ${F.u}`;
    ctx.fillStyle = C.gold;
    ctx.textAlign = "left";
    const labels = {
      intact: "INTACT — Tap/click to create a crack",
      cracked: "CRACKED — Add water to begin",
      water: "WATER ENTERING — Activate healing",
      healing: `Ca²⁺ → CaCO₃ crystallizing: ${s.healed}%`,
      healed: "SEALED ✓ Crack healed by CaCO₃"
    };
    ctx.fillText(labels[s.phase] || "", 30, H - 20);
  }, []);

  const handleClick = useCallback((e) => {
    const s = stateRef.current;
    if (s.phase !== "intact") return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
    const x = (e.clientX - rect.left) * (canvas.width / dpr / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / dpr / rect.height);
    const crack = [];
    let cx = Math.max(40, x - 100), cy = y;
    for (let i = 0; i < 25; i++) {
      cx += 8;
      cy += (Math.random() - 0.5) * 10;
      crack.push({ x: cx, y: cy });
    }
    s.cracks.push(crack);
    s.phase = "cracked";
    setPhase("cracked");
  }, []);

  const addWater = () => { stateRef.current.phase = "water"; setPhase("water"); };
  const activateHealing = () => { stateRef.current.phase = "healing"; setPhase("healing"); };
  const reset = () => {
    const s = stateRef.current;
    s.cracks = []; s.phase = "intact"; s.healed = 0;
    for (let i = 0; i < s.particles.length; i++) {
      if (s.particles[i].type === "clast") s.particles[i].dissolved = 0;
    }
    for (let i = 0; i < s.healingPool.length; i++) s.healingPool[i].active = false;
    setPhase("intact");
    setHealedPct(0);
  };

  return (
    <div>
      <canvas
        ref={canvasRef}
        onClick={handleClick}
        role="img"
        aria-label="Interactive Roman concrete cross-section. Click to create a crack, then trigger self-healing."
        style={{

        <Btn disabled={phase !== "water"} onClick={activateHealing} color={C.green}>⚗️ Activate Lime Clasts</Btn>

      <Formula label="Reaction Sequence">{`CaO + H₂O → Ca(OH)₂   (ΔH ≈ −65 kJ/mol; "hot mixing" produces local T > 200°C)
Ca(OH)₂ → Ca²⁺ + 2 OH⁻  (lime clast dissolves where crack-water arrives)
Ca²⁺ + CO₂(aq) + H₂O → CaCO₃↓   (precipitates in crack)
Lab observation: measurable resealing in ~2 weeks (Seymour et al., 2023)`}</Formula>
      <Disclaimer>

      </Disclaimer>
      <DeepScience moduleKey="concrete" />
    </div>  );
}

      const sunY = H * 0.22;
      const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 70);
      sg.addColorStop(0, "rgba(255,220,100,0.7)");
      sg.addColorStop(1, "rgba(255,220,100,0)");
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(sunX, sunY, 70, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sunX, sunY, 18, 0, Math.PI * 2);
      ctx.fillStyle = "#FFD700";
      ctx.fill();
    }

    // Calcite crystal
    const cx = W / 2, cy = H * 0.6;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(crystalAngle * Math.PI / 180);
    ctx.beginPath();
    ctx.moveTo(0, -45);
    ctx.lineTo(32, 0);
    ctx.lineTo(0, 45);
    ctx.lineTo(-32, 0);
    ctx.closePath();
    ctx.fillStyle = "rgba(200,220,240,0.35)";
    ctx.fill();
    ctx.strokeStyle = "rgba(200,220,240,0.65)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // O-ray and E-ray spots
    // Intensities: sinusoidal function of crystal-sun angle diff.
    const delta = (crystalAngle - sunAngle) * Math.PI / 90;
    const oI = clamp(0.3 + Math.cos(delta) * 0.3 + 0.2, 0.05, 0.95);
    const eI = clamp(0.3 - Math.cos(delta) * 0.3 + 0.2, 0.05, 0.95);
    ctx.beginPath();
    ctx.arc(-11, -14, 7, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,200,100,${oI})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(11, 14, 7, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,180,255,${eI})`;
    ctx.fill();
    ctx.restore();

    // Match banner
    if (Math.abs(oI - eI) < 0.08) {
      ctx.font = `bold 16px ${F.u}`;
      ctx.fillStyle = C.green;
      ctx.textAlign = "center";
      ctx.fillText("✓ Rays matched — Sun direction found!", W / 2, H - 25);
    }

    // HUD
    ctx.font = `12px ${F.m}`;
    ctx.fillStyle = C.gold;
    ctx.textAlign = "left";
    ctx.fillText(`Crystal: ${crystalAngle}°`, 12, 20);
    ctx.fillText(`Sun: ${found ? sunAngle + "°" : "???"}`, 12, 36);
    ctx.fillText(`Error: ${diff.toFixed(1)}°`, 12, 52);
  }, [crystalAngle, found, diff, revision]);

  const newSun = () => {
    sunAngleRef.current = Math.floor(Math.random() * 360);
    setCrystalAngle(0);
    setRevision(r => r + 1);
  };

  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label="Cloudy sky with calcite sunstone. Rotate the crystal to find the hidden sun using birefringence."
        style={{ width:"100%", height:340, borderRadius:12, display:"block" }}
      />
      <div style={{ marginTop:12 }}>
        <Slider
          label={`ROTATE CRYSTAL: ${crystalAngle}°`}
          value={crystalAngle} onChange={v => setCrystalAngle(clamp(safe(v, 0), 0, 359))}
          min={0} max={359} color={C.gold}
        />
        <div style={{ marginTop:8 }}>
          <Btn onClick={newSun} color={C.dim}>🔄 New Sun Position</Btn>
        </div>
      </div>
      <Formula label="Calcite Birefringence (measured, 589 nm)">{`Ordinary index n_o ≈ 1.658
Extraordinary index n_e ≈ 1.486
Birefringence Δn = n_e − n_o ≈ −0.172

Rayleigh sky polarization maximum at 90° from the sun:
P(θ) = sin²θ / (1 + cos²θ)

Historical accuracy: experimental reconstructions suggest ±3–5° under overcast skies
(see Ropars et al., 2012 — Proc. R. Soc. A).`}</Formula>
      <Disclaimer>
        Whether Vikings actually used calcite ("sólarsteinn") for navigation is debated among historians.
        The optical principle is sound; archaeological direct evidence is limited.
      </Disclaimer>
      <DeepScience moduleKey="sunstone" />
    </div>  );
}

// 4. LORENZ ATTRACTOR (Butterfly Effect)
// ═══════════════════════════════════════════════════
function LorenzAttractor() {
  const canvasRef = useRef(null);
  const [pert, setPert] = useState(-6);
  const stateRef = useRef(null);

  // Reset simulation when perturbation changes
  useEffect(() => {
    const canvas = canvasRef.current;
    if (canvas) setupCanvas(canvas);
    stateRef.current = {
      s1: { x: 1, y: 1, z: 1 },
      s2: { x: 1 + Math.pow(10, pert), y: 1, z: 1 },
      // Circular buffers (fixed-size, no shift())
      trail1: new Float32Array(3000 * 2),
      trail2: new Float32Array(3000 * 2),
      head: 0, count: 0,
      step: 0,
      initialCleared: false,
    };
  }, [pert]);

  useAnimationFrame(() => {
    const canvas = canvasRef.current;
    const st = stateRef.current;
    if (!canvas || !st) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    if (W < 10 || H < 10) return;

    // RK4 integration (more stable than Euler for chaotic systems)
    const sigma = 10, rho = 28, beta = 8 / 3, dt = 0.006;
    const deriv = (s) => ({
      dx: sigma * (s.y - s.x),
      dy: s.x * (rho - s.z) - s.y,
      dz: s.x * s.y - beta * s.z,
    });
    const rk4 = (s) => {
      const k1 = deriv(s);
      const s2 = { x: s.x + k1.dx * dt / 2, y: s.y + k1.dy * dt / 2, z: s.z + k1.dz * dt / 2 };
      const k2 = deriv(s2);
      const s3 = { x: s.x + k2.dx * dt / 2, y: s.y + k2.dy * dt / 2, z: s.z + k2.dz * dt / 2 };
      const k3 = deriv(s3);
      const s4 = { x: s.x + k3.dx * dt, y: s.y + k3.dy * dt, z: s.z + k3.dz * dt };
      const k4 = deriv(s4);
      return {
        x: s.x + (k1.dx + 2 * k2.dx + 2 * k3.dx + k4.dx) * dt / 6,
        y: s.y + (k1.dy + 2 * k2.dy + 2 * k3.dy + k4.dy) * dt / 6,
        z: s.z + (k1.dz + 2 * k2.dz + 2 * k3.dz + k4.dz) * dt / 6,
      };
    };

    const scale = Math.min(W, H) * 0.018;
    const proj = (s) => ({
      x: W * 0.5 + (s.x - s.y) * 0.7 * scale,
      y: H * 0.7 - s.z * scale
    });

    for (let i = 0; i < 4; i++) {
      st.s1 = rk4(st.s1);
      st.s2 = rk4(st.s2);
      const p1 = proj(st.s1);
      const p2 = proj(st.s2);
      const idx = (st.head % 3000) * 2;
      st.trail1[idx] = p1.x; st.trail1[idx + 1] = p1.y;
      st.trail2[idx] = p2.x; st.trail2[idx + 1] = p2.y;
      st.head++;
      if (st.count < 3000) st.count++;
      st.step++;
    }

    // Fade background
    if (!st.initialCleared) {
      ctx.fillStyle = C.bg;
      ctx.fillRect(0, 0, W, H);
      st.initialCleared = true;
    } else {
      ctx.fillStyle = "rgba(6,7,16,0.08)";
      ctx.fillRect(0, 0, W, H);
    }

    // Draw trails (from oldest to newest)
    // Pre-computed color constants (avoid per-frame string allocation)
    const TRAIL1_COL = C.cyan + "90";
    const TRAIL2_COL = C.red + "90";
    const drawTrail = (arr, color) => {
      ctx.beginPath();
      const start = st.count < 3000 ? 0 : st.head;
      let first = true;
      for (let k = 0; k < st.count; k++) {
        const idx = ((start + k) % 3000) * 2;
        const x = arr[idx], y = arr[idx + 1];
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    };
    drawTrail(st.trail1, TRAIL1_COL);
    drawTrail(st.trail2, TRAIL2_COL);

    // Divergence measurement
    const dx = st.s1.x - st.s2.x, dy = st.s1.y - st.s2.y, dz = st.s1.z - st.s2.z;
    const div = Math.sqrt(dx * dx + dy * dy + dz * dz);

    ctx.font = `13px ${F.m}`;
    ctx.fillStyle = C.text;
    ctx.textAlign = "left";
    ctx.fillText(`Divergence: ${div.toFixed(4)}`, 15, 22);
    ctx.fillText(`Δ₀ (initial): ${Math.pow(10, pert).toExponential(1)}`, 15, 40);
    ctx.fillText(`Lyapunov λ ≈ 0.9056`, 15, 58);
    if (div > 5) {
      ctx.fillStyle = C.red;
      ctx.fillText(`⚡ Trajectories have diverged`, 15, 76);
    }
  });

  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label="Lorenz attractor showing two trajectories with slightly different initial conditions diverging over time."
        style={{ width:"100%", height:340, borderRadius:12, background:C.bg, display:"block" }}
      />
      <div style={{ marginTop:12 }}>
        <Slider
          label={`INITIAL PERTURBATION: 10^${pert} = ${Math.pow(10, pert).toExponential(1)}`}
          value={pert} onChange={v => setPert(clamp(Math.round(safe(v, -6)), -10, -1))}
          min={-10} max={-1} color={C.red}
        />
      </div>
      <Formula label="Lorenz (1963) — Canonical Parameters">{`dx/dt = σ(y − x)
dy/dt = x(ρ − z) − y
dz/dt = xy − β z      with σ=10, ρ=28, β=8/3

Largest Lyapunov exponent λ ≈ 0.9056 (dimensionless, per time unit)
Trajectories separate exponentially: |Δ(t)| ≈ |Δ₀|·e^(λt)

Integration: 4th-order Runge-Kutta, dt = 0.006`}</Formula>
      <Disclaimer>
        The Lorenz system is a simplified 3-variable model of atmospheric convection. Real weather forecasts
        involve millions of variables; the ~2-week horizon is a broader estimate from operational NWP, not from λ alone.
      </Disclaimer>
      <DeepScience moduleKey="chaos" />
    </div>  );
}

// 5. DNA ENCODER (3D helix)
// ═══════════════════════════════════════════════════
function DNAEncoder() {
  const [text, setText] = useState("ANCIENTQ");
  const canvasRef = useRef(null);
  const rendererRef = useRef(null);
  const sceneObjRef = useRef(null);

  // Sanitize: strip control chars, limit length, uppercase ASCII+digits+space
  const safeText = useMemo(() => {
    return (text || "")
      .replace(/[\x00-\x1F\x7F]/g, "") // control chars
      .toUpperCase()
      .slice(0, 40);
  }, [text]);

  const encoded = useMemo(() => {
    const bin = safeText.split("").map(c => c.charCodeAt(0).toString(2).padStart(8, "0")).join("");
    const bases = [];
    const map = { "00": "A", "01": "T", "10": "C", "11": "G" };
    for (let i = 0; i < bin.length; i += 2) {
      bases.push(map[bin.substr(i, 2)] || "A");
    }
    return { bin, bases, bytes: safeText.length, nucs: bases.length };
  }, [safeText]);

  // Three.js setup — dispose everything on unmount
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;

    const scene = new Scene();
    const W = canvas.clientWidth || 300;
    const H = 280;
    const camera = new PerspectiveCamera(50, W / H, 0.1, 100);
    camera.position.set(0, 0, 12);

    let renderer;
    try {
      renderer = new WebGLRenderer({ canvas, alpha: true, antialias: true });
    } catch (e) {
      // WebGL unavailable — silent fallback
      return;
    }
    renderer.setSize(W, H, false);
    renderer.setPixelRatio(clamp(window.devicePixelRatio || 1, 1, 2));
    rendererRef.current = renderer;

    // Handle WebGL context loss
    const onContextLost = (e) => { e.preventDefault(); };
    canvas.addEventListener("webglcontextlost", onContextLost);

    scene.add(new AmbientLight(0x404060, 1));
    const dl = new DirectionalLight(0xffeedd, 1.5);
    dl.position.set(5, 5, 5);
    scene.add(dl);

    const group = new Group();
    scene.add(group);

    const baseColors = { A: 0xff4d4d, T: 0x00e09e, C: 0x3b82f6, G: 0xffa500 };
    const n = Math.min(encoded.bases.length, 70);
    const sharedBackbone = new SphereGeometry(0.08, 10, 10);
    const backboneMat = new MeshStandardMaterial({ color: 0xD4A843, emissive: 0xD4A843, emissiveIntensity: 0.2 });
    const disposables = [sharedBackbone, backboneMat];

    for (let i = 0; i < n; i++) {
      const t = i * 0.25;
      const y = (i - n / 2) * 0.22;
      const r = 1.8;
      [t, t + Math.PI].forEach(a => {
        const s = new Mesh(sharedBackbone, backboneMat);
        s.position.set(Math.cos(a) * r, y, Math.sin(a) * r);
        group.add(s);
      });
      if (i % 2 === 0) {
        const base = encoded.bases[i] || "A";
        const p1 = new Vector3(Math.cos(t) * r, y, Math.sin(t) * r);
        const p2 = new Vector3(Math.cos(t + Math.PI) * r, y, Math.sin(t + Math.PI) * r);
        const len = p1.distanceTo(p2);
        const cg = new CylinderGeometry(0.05, 0.05, len, 6);
        const cm = new MeshStandardMaterial({
          color: baseColors[base], emissive: baseColors[base],
          emissiveIntensity: 0.4, transparent: true, opacity: 0.85
        });
        disposables.push(cg, cm);
        const conn = new Mesh(cg, cm);
        conn.position.lerpVectors(p1, p2, 0.5);
        conn.lookAt(p2);
        conn.rotateX(Math.PI / 2);
        group.add(conn);
      }
    }

    sceneObjRef.current = { scene, camera, group, disposables };

    let frameId = 0;
    let active = true;
    let time = 0;
    const animate = () => {
      if (!active) return;
      frameId = requestAnimationFrame(animate);
      if (document.hidden) return;
      time += 0.008;
      group.rotation.y = time;
      try { renderer.render(scene, camera); } catch (e) { /* context lost */ }
    };
    animate();

    return () => {
      active = false;
      cancelAnimationFrame(frameId);
      canvas.removeEventListener("webglcontextlost", onContextLost);
      // Dispose all geometries/materials
      disposables.forEach(d => {
        try { d.dispose && d.dispose(); } catch (e) {}
      });
      // Clear scene graph to release references
      try { scene.clear && scene.clear(); } catch (e) {}
      renderer.dispose();
      rendererRef.current = null;
      sceneObjRef.current = null;
    };
  }, [safeText]);

  const baseColorMap = { A: "#ff6b6b", T: "#51cf66", C: "#74c0fc", G: "#ffa94d" };

  return (
    <div>
      <input
        value={text}
        onChange={e => setText(e.target.value.toUpperCase().slice(0, 40))}
        placeholder="TYPE TEXT..."
        aria-label="Text to encode into DNA bases"
        maxLength={40}
        style={{
          width:"100%", padding:"12px 16px", background:C.bg2,
          border:`1px solid ${C.gold}40`, borderRadius:8,
          color:C.text, fontFamily:F.m, fontSize:14,
          outline:"none", marginBottom:12, boxSizing:"border-box",
          minHeight:44
        }}
      />
      <div style={{
        padding:10, background:`${C.green}08`, borderRadius:8,
        marginBottom:12, fontFamily:F.m, fontSize:12, lineHeight:1.7,
        wordBreak:"break-all"
      }}>
        {encoded.bases.length === 0
          ? <span style={{ color:C.dim }}>Enter text above…</span>
          : encoded.bases.map((b, i) => (
              <span key={i} style={{ color: baseColorMap[b], fontWeight:600 }}>{b}</span>
            ))
        }
      </div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label={`3D DNA double helix encoded from input text, ${encoded.nucs} bases`}
        style={{ width:"100%", height:280, borderRadius:12, background:C.bg, display:"block" }}
      />
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:12 }}>
        <Stat label="Bytes" value={encoded.bytes} color={C.gold}/>
        <Stat label="DNA Bases" value={encoded.nucs} color={C.green}/>
        <Stat label="Strand Length" value={`${(encoded.nucs * 0.34).toFixed(1)} nm`} color={C.cyan}/>
        <Stat label="Theoretical density" value="~10⁹ GB/g" color={C.purple}/>
      </div>
      <Formula label="Simplified 2-bit encoding (pedagogical)">{`ASCII byte → 8 bits → 4 DNA bases
00→A, 01→T, 10→C, 11→G   (one of many possible mappings)

Real DNA storage systems (DNA Fountain, Church lab) use:
 • Error-correcting codes (Reed-Solomon, fountain codes)
 • GC-balance constraints (avoid ambiguous sequences)
 • Primer + address schemes for random access
 • Redundancy for read/write error tolerance`}</Formula>
      <Disclaimer>
        This is a teaching encoding, not production DNA storage. Real systems achieve lower effective density
        due to error correction and must avoid homopolymer runs that break sequencing.
      </Disclaimer>
      <DeepScience moduleKey="dna" />
    </div>  );
}

// 6. ANTIKYTHERA ECLIPSE CALCULATOR
// ═══════════════════════════════════════════════════
const SYN_MONTH = 29.530589;  // days, per IAU
const SAROS = 223;             // synodic months
function AntikytheraCalc() {
  const [crank, setCrank] = useState(0);
  const canvasRef = useRef(null);

  const moonPhase = ((crank / 360) * SAROS) % SAROS;
  const lunarLong = ((moonPhase / SAROS) * 360) % 360;
  // Approx: sun completes 1 full cycle per year; 19 years Metonic = 19 sun cycles per 235 lunations
  const solarLong = ((crank / 360) * 360 / 19) % 360;
  const eclProx = Math.abs(((lunarLong - solarLong + 180) % 360) - 180);
  const isEcl = eclProx < 12;
  const years = (crank / 360) * SAROS * SYN_MONTH / 365.25;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const setup = setupCanvas(canvas);
    if (!setup) return;
    const { ctx, W, H } = setup;

    const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.35;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Main gear (rotates with crank)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(crank * Math.PI / 180 * 0.1);
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fillStyle = "#2A2318";
    ctx.fill();
    ctx.strokeStyle = C.goldDim;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Teeth (64 for cleaner rendering)
    for (let i = 0; i < 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * (R - 2), Math.sin(a) * (R - 2));
      ctx.lineTo(Math.cos(a) * (R + 8), Math.sin(a) * (R + 8));
      ctx.strokeStyle = `${C.gold}60`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();

    // Sun
    const sunA = solarLong * Math.PI / 180 - Math.PI / 2;
    const sunX = cx + Math.cos(sunA) * R * 0.6;
    const sunY = cy + Math.sin(sunA) * R * 0.6;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 14, 0, Math.PI * 2);
    ctx.fillStyle = "#FFD700";
    ctx.fill();

    // Moon
    const moonA = lunarLong * Math.PI / 180 - Math.PI / 2;
    const moonX = cx + Math.cos(moonA) * R * 0.75;
    const moonY = cy + Math.sin(moonA) * R * 0.75;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 10, 0, Math.PI * 2);
    ctx.fillStyle = isEcl ? C.red : "#C0C0C0";
    ctx.fill();

    if (isEcl) {
      ctx.font = `bold 18px ${F.u}`;
      ctx.fillStyle = C.red;
      ctx.textAlign = "center";
      ctx.fillText("⚫ ECLIPSE CONDITION", cx, cy + R + 30);
    }

    // Center HUD
    ctx.font = `14px ${F.m}`;
    ctx.fillStyle = C.gold;
    ctx.textAlign = "center";
    ctx.fillText(`Saros: ${Math.floor(moonPhase)} / ${SAROS}`, cx, cy - 8);
    ctx.fillText(`${years.toFixed(1)} years elapsed`, cx, cy + 12);
  }, [crank, lunarLong, solarLong, isEcl, moonPhase, years]);

  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label="Antikythera mechanism gear simulation with Sun and Moon positions and eclipse detection."
        style={{ width:"100%", height:340, borderRadius:12, background:C.bg, display:"block" }}
      />
      <div style={{ marginTop:12 }}>
        <Slider
          label={`CRANK: ${crank}° → ${years.toFixed(2)} years elapsed`}
          value={crank}
          onChange={v => setCrank(clamp(Math.round(safe(v, 0)), 0, 7200))}
          min={0} max={7200} color={C.gold}
        />
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:10 }}>
        <Stat label="Saros Phase" value={`${Math.floor(moonPhase)}/${SAROS}`} color={C.gold}/>
        <Stat label="Sun λ" value={`${solarLong.toFixed(1)}°`} color="#FFD700"/>
        <Stat label="Moon λ" value={`${lunarLong.toFixed(1)}°`} color="#C0C0C0"/>
        <Stat label="Eclipse?" value={isEcl ? "YES ⚫" : "No"} color={isEcl ? C.red : C.dim}/>
      </div>
      <Formula label="Astronomical Cycles">{`Synodic Month: 29.530589 days (IAU)
Saros Cycle:  223 synodic months ≈ 6,585.32 days ≈ 18 y 11 d
Metonic:      235 lunations ≈ 19 solar years
Callippic:    4 × Metonic ≈ 76 years
Exeligmos:    3 × Saros ≈ 54 y 33 d (same-geometry eclipses)

Simplified eclipse condition: Moon-Sun ecliptic longitude opposite/aligned ± node tolerance`}</Formula>
      <Disclaimer>
        Simplified 2D visualization. The real Antikythera Mechanism (Freeth et al., 2021) modeled
        ecliptic inclination, anomaly, and planetary motion with pin-and-slot epicyclic gearing.
      </Disclaimer>
      <DeepScience moduleKey="antikythera" />
    </div>  );
}

// 7. DAMASCUS NANO ZOOM
// ═══════════════════════════════════════════════════
function DamascusZoom() {
  const [zoom, setZoom] = useState(0);
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const setup = setupCanvas(canvas);
    if (!setup) return;
    const { ctx, W, H } = setup;
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    if (zoom < 33) {
      ctx.fillStyle = "#4A4A50";
      ctx.fillRect(30, H * 0.35, W - 60, H * 0.3);
      for (let i = 0; i < 60; i++) {
        ctx.beginPath();
        const y = H * 0.35 + i * (H * 0.3 / 60);
        ctx.moveTo(30, y);
        for (let x = 30; x < W - 30; x += 4) {
          ctx.lineTo(x, y + Math.sin(x * 0.008 + i * 0.4) * 6 * Math.sin(x * 0.003) * 2);
        }
        ctx.strokeStyle = `rgba(180,180,190,${0.15 + Math.sin(i * 0.3) * 0.1})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.font = `16px ${F.u}`;
      ctx.fillStyle = C.gold;
      ctx.textAlign = "center";
      ctx.fillText("MACRO — Damascus Pattern (~1×)", W / 2, H * 0.18);
    } else if (zoom < 66) {
      ctx.fillStyle = "#3A3A42";
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 25; i++) {
        const y = i * (H / 25);
        ctx.fillStyle = `rgba(200,200,210,${0.3 + Math.sin(i * 0.5) * 0.15})`;
        for (let x = 0; x < W; x += 3) {
          ctx.fillRect(x, y + Math.sin(x * 0.01 + i) * 6, 2, 3);
        }
      }
      ctx.font = `16px ${F.u}`;
      ctx.fillStyle = C.gold;
      ctx.textAlign = "center";
      ctx.fillText("MICRO — Cementite (Fe₃C) banding (~500×)", W / 2, 28);
    } else {
      ctx.fillStyle = "#1A1A22";
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 28; i++) {
        const cx = 60 + Math.random() * (W - 120);
        const cy = 60 + Math.random() * (H - 120);
        const len = 50 + Math.random() * 150;
        const ang = Math.random() * Math.PI;
        const dia = 10 + Math.random() * 14;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(ang);
        ctx.strokeStyle = `rgba(0,229,255,${0.4 + Math.random() * 0.3})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-len / 2, -dia / 2);
        ctx.lineTo(len / 2, -dia / 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-len / 2, dia / 2);
        ctx.lineTo(len / 2, dia / 2);
        ctx.stroke();
        if (i % 3 === 0) {
          ctx.strokeStyle = "rgba(255,165,0,0.5)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-len / 2 + 10, 0);
          ctx.lineTo(len / 2 - 10, 0);
          ctx.stroke();
        }
        ctx.restore();
      }
      ctx.font = `16px ${F.u}`;
      ctx.fillStyle = C.cyan;
      ctx.textAlign = "center";
      ctx.fillText("NANO — Carbon nanotubes / cementite nanowires (TEM)", W / 2, 28);
    }
  }, [zoom]);

  const stage = zoom < 33 ? "MACRO (~1×)" : zoom < 66 ? "MICRO (~500×)" : "NANO (TEM)";
  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label={`Damascus steel visualization at ${stage} magnification`}
        style={{ width:"100%", height:320, borderRadius:12, background:C.bg, display:"block" }}

      <div style={{ marginTop:12 }}>

          value={zoom}
          onChange={v => setZoom(clamp(safe(v, 0), 0, 100))}

      <Formula label="Reibold, Paufler et al., Nature 444, 286 (2006)">{`TEM of a 17th-century Damascus sabre revealed:
 • Carbon nanotubes (~10–20 nm diameter)
 • Cementite (Fe₃C) nanowires
 • Likely catalyzed by trace V, Mn, Cr in Wootz steel during thermomechanical cycling

The technique was lost around ~1750 CE when source ore composition changed.`}</Formula>

// 8. ATOM INTERFEROMETER (Quantum Compass)
// ═══════════════════════════════════════════════════
function AtomInterferometer() {
  const [temp, setTemp] = useState(100);     // nK
  const [intT, setIntT] = useState(50);      // ms
  const [atoms, setAtoms] = useState(1e6);
  const canvasRef = useRef(null);
  const stateRef = useRef({ time: 0 });

  // De Broglie λ = h / p = ℏ × 2π / √(2 m kT)
  // Using ℏ (reduced Planck): correct expression is λ = h/√(2mkT) with h = 2πℏ
  const h = PHYS.hbar * 2 * Math.PI;
  const T_K = Math.max(1e-12, temp * 1e-9);   // convert nK to K, avoid 0
  const lDB = h / Math.sqrt(2 * PHYS.mRb87 * PHYS.kB * T_K);

  const tau = Math.max(1e-6, intT * 1e-3);  // ms → s
  const N = Math.max(1, atoms);
  const sens = PHYS.hbar * PHYS.kEffRb / (PHYS.mRb87 * tau * tau * Math.sqrt(N));
  const sensG = sens / PHYS.g;
  const advantage = 1e-6 / Math.max(sensG, 1e-20);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (canvas) setupCanvas(canvas);
  }, []);

  useAnimationFrame(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    if (W < 10 || H < 10) return;
    const s = stateRef.current;
    s.time += 0.03;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    const midY = H / 2;
    const sX = 40, eX = W - 60;
    const spX = sX + (eX - sX) * 0.25;
    const mX = sX + (eX - sX) * 0.5;
    const rX = sX + (eX - sX) * 0.75;
    const sep = 24 + (intT / 100) * 50;

    const drawWave = (x1, y1, x2, y2, col, amp, fr) => {
      ctx.beginPath();
      for (let x = x1; x <= x2; x += 2) {
        const p = (x - x1) / (x2 - x1);
        const env = Math.sin(p * Math.PI);
        const y = y1 + (y2 - y1) * p + Math.sin((x - x1) * fr * 0.02 + s.time) * amp * env;
        if (x === x1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.stroke();
    };

    drawWave(sX, midY, spX, midY, `${C.gold}80`, 12, 3);
    drawWave(spX, midY, mX, midY - sep, `${C.cyan}90`, 10, 4);
    drawWave(mX, midY - sep, rX, midY, `${C.cyan}90`, 10, 4);
    drawWave(spX, midY, mX, midY + sep, `${C.purple}90`, 10, 4.2);
    drawWave(mX, midY + sep, rX, midY, `${C.purple}90`, 10, 4.2);

    // Fringe pattern
    for (let i = 0; i < 30; i++) {
      const y = midY - 60 + i * 4;
      const I = Math.cos(i * 0.5 + s.time * 0.5) ** 2;
      ctx.fillStyle = `rgba(0,229,255,${I * 0.8})`;
      ctx.fillRect(rX + 20, y, 40 * I, 3);
    }

    // HUD (kept concise to fit mobile widths)
    ctx.font = `12px ${F.m}`;
    ctx.fillStyle = C.cyan;
    ctx.textAlign = "left";
    ctx.fillText(`λ_dB = ${(lDB * 1e9).toFixed(2)} nm`, 12, 22);
    ctx.fillText(`δa = ${sensG.toExponential(1)} g/√Hz`, 12, 40);
    ctx.fillText(`≈ ${advantage.toExponential(1)}× MEMS`, 12, 58);
  });

  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label="Mach-Zehnder style atom interferometer showing coherent beam splitting, free evolution, and recombination with interference fringes."
        style={{ width:"100%", height:280, borderRadius:12, background:C.bg, display:"block" }}
      />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:10, marginTop:12 }}>
        <Slider label={`TEMP: ${temp} nK`} value={temp}
          onChange={v => setTemp(clamp(Math.round(safe(v, 100)), 1, 1000))}
          min={1} max={1000} color={C.cyan}/>
        <Slider label={`INTERROGATION τ: ${intT} ms`} value={intT}
          onChange={v => setIntT(clamp(Math.round(safe(v, 50)), 1, 200))}
          min={1} max={200} color={C.purple}/>
        <Slider label={`ATOMS N: ${atoms.toLocaleString()}`} value={atoms}
          onChange={v => setAtoms(clamp(safe(v, 1e6), 1000, 1e7))}
          min={1000} max={1e7} step={1000} color={C.green}/>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:12 }}>
        <Stat label="De Broglie λ" value={`${(lDB * 1e9).toFixed(2)} nm`} color={C.cyan}/>
        <Stat label="Sensitivity" value={`${sensG.toExponential(1)}`} sub="g/√Hz" color={C.green}/>
        <Stat label="vs classical" value={`${advantage.toExponential(1)}×`} color={C.purple}/>
      </div>
      <Formula label="Atom Interferometry (⁸⁷Rb, D2 line 780.241 nm)">{`De Broglie wavelength:
  λ_dB = h / √(2 m_Rb k_B T)
  h = 2π·ℏ = 6.6261 × 10⁻³⁴ J·s

Shot-noise-limited acceleration sensitivity:
  δa = ℏ k_eff / (m τ² √N)
  k_eff = 2 × (2π / λ_laser) ≈ 1.612 × 10⁷ m⁻¹

CODATA 2018 constants used:
  ℏ = 1.054572 × 10⁻³⁴ J·s
  k_B = 1.380649 × 10⁻²³ J/K
  m(⁸⁷Rb) = 1.443161 × 10⁻²⁵ kg`}</Formula>
      <Disclaimer>
        Shot-noise-limited formula. Real devices are additionally limited by vibration,
        laser phase noise, and magnetic gradients.
      </Disclaimer>
      <DeepScience moduleKey="atom" />
    </div>  );
}

// 9. QUANTUM ADVANTAGE CALCULATOR
// ═══════════════════════════════════════════════════
function QuantumAdvantage() {
  const [N, setN] = useState(1000);
  const [qubits, setQubits] = useState(50);
  const canvasRef = useRef(null);

  const classicalT = Math.pow(N, 3);
  const quantumT = Math.max(1, Math.pow(Math.log2(Math.max(2, N)), 2) * 10);
  const speedup = classicalT / quantumT;
  const hilbertExp = qubits; // just show as 2^qubits

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const setup = setupCanvas(canvas);
    if (!setup) return;
    const { ctx, W, H } = setup;

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    const m = { l: 60, r: 20, t: 40, b: 40 };
    const gW = W - m.l - m.r;
    const gH = H - m.t - m.b;

    ctx.strokeStyle = `${C.dim}60`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.l, m.t);
    ctx.lineTo(m.l, H - m.b);
    ctx.lineTo(W - m.r, H - m.b);
    ctx.stroke();

    ctx.font = `11px ${F.m}`;
    ctx.fillStyle = C.dim;
    ctx.textAlign = "center";
    ctx.fillText("Problem size N →", W / 2, H - 10);
    ctx.save();
    ctx.translate(14, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("log₁₀(ops)", 0, 0);
    ctx.restore();

    const Nmax = Math.max(10, N);
    const maxLog = Math.log10(Math.pow(Nmax, 3)) + 0.5;

    const plot = (fn, color, label) => {
      ctx.beginPath();
      for (let i = 1; i <= 100; i++) {
        const n = Math.max(2, (i / 100) * Nmax);
        const v = Math.log10(Math.max(1, fn(n)));
        const x = m.l + (i / 100) * gW;
        const y = (H - m.b) - clamp(v / maxLog, 0, 1) * gH;
        if (i === 1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // End label
      const lv = Math.log10(Math.max(1, fn(Nmax)));
      const ly = (H - m.b) - clamp(lv / maxLog, 0, 1) * gH;
      ctx.fillStyle = color;
      ctx.font = `bold 11px ${F.u}`;
      ctx.textAlign = "right";
      ctx.fillText(label, W - m.r - 4, ly - 6);
    };

    plot(n => Math.pow(n, 3), C.red, "O(N³) classical");
    plot(n => Math.pow(n, 2), C.orange, "O(N²)");
    plot(n => Math.pow(Math.log2(n), 2) * 10, C.cyan, "O(log²N) HHL*");
    plot(n => Math.sqrt(n), C.green, "O(√N) Grover");

    ctx.font = `13px ${F.u}`;
    ctx.fillStyle = C.gold;
    ctx.textAlign = "center";
    ctx.fillText(`N=${N.toLocaleString()} · asymptotic speedup: ${speedup.toExponential(1)}×`, W / 2, 24);
  }, [N, speedup]);

  return (
    <div>
      <canvas
        ref={canvasRef}
        role="img"
        aria-label="Log-scale plot comparing classical O(N³) vs quantum O(log²N) complexity curves."
        style={{ width:"100%", height:320, borderRadius:12, background:C.bg, display:"block" }}
      />
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:12 }}>
        <Slider label={`N: ${N.toLocaleString()}`} value={N}
          onChange={v => setN(clamp(Math.round(safe(v, 1000)), 10, 100000))}
          min={10} max={100000} step={10} color={C.cyan}/>
        <Slider label={`QUBITS: ${qubits} → 2^${hilbertExp} states`} value={qubits}
          onChange={v => setQubits(clamp(Math.round(safe(v, 50)), 2, 300))}
          min={2} max={300} color={C.purple}/>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:16 }}>
        <Stat label="Classical" value={classicalT.toExponential(1)} sub="ops" color={C.red}/>
        <Stat label="Quantum (asymp.)" value={quantumT.toFixed(0)} sub="ops" color={C.cyan}/>
        <Stat label="Asymp. speedup" value={`${speedup.toExponential(1)}×`} color={C.green}/>
        <Stat label="State space"
          value={`2^${qubits}`}
          sub={qubits >= 266 ? "> atoms in universe" : "states"}
          color={C.purple}/>
      </div>
      <Formula label="Complexity (asymptotic, per well-known bounds)">{`Classical matrix inversion:      O(N³)     (Gauss-Jordan)
HHL quantum algorithm (*):       O(log²N · poly(κ, 1/ε))
Grover unstructured search:      O(√N)
Classical search (unstructured): O(N)

(*) HHL has strong caveats: sparse matrices, state-preparation, readout cost.
Real-world end-to-end quantum advantage for practical problems is an active research area.`}</Formula>
      <Disclaimer>
        Asymptotic curves omit constant factors, error-correction overhead, decoherence, and I/O costs.
        Actual near-term quantum advantage requires careful problem matching.
      </Disclaimer>
      <DeepScience moduleKey="quantum_adv" />
    </div>  );
}

        }}
      >

            style={{

              borderRadius:"6px 6px 0 0",

    // Hide boot loader once the app has rendered
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('boot-loader');
        if (loader) {
          loader.classList.add('hide');
          setTimeout(() => loader.remove(), 400);
        }
      });
    });

  <script>
    // Show clear error if scripts fail to load (e.g. offline first visit)
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (typeof React === 'undefined' || typeof THREE === 'undefined' || typeof Babel === 'undefined') {
          var missing = [];
          if (typeof React === 'undefined') missing.push('React');
          if (typeof THREE === 'undefined') missing.push('Three.js');
          if (typeof Babel === 'undefined') missing.push('Babel');
          var loader = document.getElementById('boot-loader');
          if (loader) {
            loader.innerHTML = '<h1>AncientQ</h1>' +
              '<p style="color:#FF4D4D">Failed to load: ' + missing.join(', ') + '</p>' +
              '<p style="color:#8A7F73;margin-top:20px;font-size:11px;letter-spacing:.1em;max-width:400px;text-align:center;line-height:1.6">' +
              'AncientQ needs an internet connection on first launch to download React + Three.js from a CDN.<br><br>' +
              'Please check your connection and reload.' +
              '</p>';
            loader.style.opacity = '1';
            loader.classList.remove('hide');
          }
        }
      }, 5000);
    });
  </script>
